name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      platforms:
        description: "Comma-separated platforms, e.g. linux/amd64,linux/arm64"
        required: false
        default: "linux/amd64,linux/arm64"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: registry.cn-beijing.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve platforms
        id: plat
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.platforms }}" ]; then
            echo "value=${{ github.event.inputs.platforms }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: ${{ steps.plat.outputs.value }}
          tags: docker.io/shaowenchen/agentpark:latest

      - name: Push to Aliyun (skopeo mirror)
        run: |
          docker run --rm -v "$HOME/.docker/config.json:/auth.json:ro" \
            quay.io/skopeo/stable copy \
            docker://docker.io/shaowenchen/agentpark:latest \
            docker://registry.cn-beijing.aliyuncs.com/opshub/shaowenchen-agentpark:latest \
            --dest-authfile /auth.json \
            --insecure-policy \
            --src-tls-verify=false \
            --dest-tls-verify=false \
            --retry-times 5 \
            --all
